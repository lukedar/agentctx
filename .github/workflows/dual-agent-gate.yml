name: Dual-Agent Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm i -g pnpm@10.12.1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dual-agent evaluation gate
        run: pnpm da:eval

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dual-agent-runner-reports
          path: .dual-agent-runner/reports/**
          if-no-files-found: warn
