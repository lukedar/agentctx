name: Runner Docs

on:
  push:
    branches: [main]
    paths:
      - docs-agentctx/**
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .github/workflows/runner-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm i -g pnpm@10.12.1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          # GitHub Pages project sites are served from /<repo>/.
          VITEPRESS_BASE: /agentctx/
        run: pnpm -C docs-agentctx build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-agentctx/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
