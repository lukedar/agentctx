<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120e1f" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="builderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="evaluatorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="stateGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.45" />
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(15, 23, 42, 0.72); stroke: #334155; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
    .node { fill: #0b1220; stroke: #334155; stroke-width: 1.6; rx: 16; }
    .builder { fill: url(#builderGrad); stroke: #60a5fa; stroke-width: 2; rx: 16; }
    .evaluator { fill: url(#evaluatorGrad); stroke: #f87171; stroke-width: 2; rx: 16; }
    .state { fill: url(#stateGrad); stroke: #2dd4bf; stroke-width: 2; rx: 16; }
    .title { fill: #ffffff; font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .label { fill: #f8fafc; font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .text { fill: #e2e8f0; font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .muted { fill: #94a3b8; font: 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .arrow { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .arrowBlue { stroke: #60a5fa; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
    .arrowRed { stroke: #f87171; stroke-width: 2.2; fill: none; marker-end: url(#arrowRed); }
    .chip { fill: #1e293b; stroke: #334155; stroke-width: 1; rx: 999; }
  </style>

  <rect class="bg" width="1320" height="620" />

  <text class="title" x="34" y="34">Dual Agent Runner internal pipeline</text>
  <text class="muted" x="34" y="56">The Builder implements, the Evaluator scores, and the state machine keeps multi-step work ordered.</text>

  <rect class="panel" x="24" y="82" width="1272" height="170" rx="20" />
  <text class="label" x="52" y="114">Task intake and planning</text>

  <rect class="node" x="52" y="132" width="180" height="78" rx="16" />
  <text class="label" x="76" y="162">Task plan</text>
  <text class="muted" x="76" y="184">goal • scope • steps</text>

  <rect class="node" x="262" y="132" width="180" height="78" rx="16" />
  <text class="label" x="286" y="162">State</text>
  <text class="muted" x="286" y="184">state.json per task</text>

  <rect class="node" x="472" y="132" width="180" height="78" rx="16" />
  <text class="label" x="496" y="162">Builder prompt</text>
  <text class="muted" x="496" y="184">implementation brief</text>

  <rect class="node" x="682" y="132" width="180" height="78" rx="16" />
  <text class="label" x="704" y="162">Evaluator prompt</text>
  <text class="muted" x="704" y="184">review brief</text>

  <rect class="node" x="892" y="132" width="180" height="78" rx="16" />
  <text class="label" x="918" y="162">Step report</text>
  <text class="muted" x="918" y="184">per-step JSON/MD</text>

  <rect class="node" x="1102" y="132" width="168" height="78" rx="16" />
  <text class="label" x="1124" y="162">Repo report</text>
  <text class="muted" x="1124" y="184">dev-eval</text>

  <path class="arrow" d="M 232 171 L 262 171" />
  <path class="arrow" d="M 442 171 L 472 171" />
  <path class="arrow" d="M 652 171 L 682 171" />
  <path class="arrow" d="M 862 171 L 892 171" />
  <path class="arrow" d="M 1072 171 L 1102 171" />

  <rect class="panel" x="24" y="276" width="414" height="260" rx="20" />
  <text class="label" x="52" y="308">Builder lane</text>

  <rect class="builder" x="52" y="332" width="170" height="58" rx="16" />
  <text class="label" x="76" y="364">Implement step</text>
  <text class="muted" x="76" y="382">edit files, tests</text>

  <rect class="builder" x="236" y="332" width="170" height="58" rx="16" />
  <text class="label" x="260" y="364">Write outputs</text>
  <text class="muted" x="260" y="382">build artifacts</text>

  <rect class="builder" x="52" y="410" width="170" height="58" rx="16" />
  <text class="label" x="76" y="442">Fix failures</text>
  <text class="muted" x="76" y="460">revise and rerun</text>

  <rect class="builder" x="236" y="410" width="170" height="58" rx="16" />
  <text class="label" x="260" y="442">Advance step</text>
  <text class="muted" x="260" y="460">when PASS</text>

  <text class="muted" x="52" y="496">The Builder owns the work. It does not decide quality; it just implements and repairs.</text>

  <rect class="panel" x="464" y="276" width="392" height="260" rx="20" />
  <text class="label" x="492" y="308">Evaluator lane</text>

  <rect class="evaluator" x="492" y="332" width="160" height="58" rx="16" />
  <text class="label" x="516" y="364">Read change</text>
  <text class="muted" x="516" y="382">inspect diff</text>

  <rect class="evaluator" x="670" y="332" width="160" height="58" rx="16" />
  <text class="label" x="694" y="364">Score</text>
  <text class="muted" x="694" y="382">tokenUsage + more</text>

  <rect class="evaluator" x="492" y="410" width="160" height="58" rx="16" />
  <text class="label" x="518" y="442">Flag risks</text>
  <text class="muted" x="518" y="460">regressions</text>

  <rect class="evaluator" x="670" y="410" width="160" height="58" rx="16" />
  <text class="label" x="690" y="442">Return status</text>
  <text class="muted" x="690" y="460">PASS / REVISE</text>

  <text class="muted" x="492" y="496">The Evaluator is the gate. It decides whether the current step can advance.</text>

  <rect class="panel" x="880" y="276" width="416" height="260" rx="20" />
  <text class="label" x="908" y="308">Step machine</text>

  <rect class="state" x="908" y="332" width="152" height="58" rx="16" />
  <text class="label" x="932" y="364">Queued</text>
  <text class="muted" x="932" y="382">next step pending</text>

  <rect class="state" x="1080" y="332" width="180" height="58" rx="16" />
  <text class="label" x="1102" y="364">Active</text>
  <text class="muted" x="1102" y="382">Builder + Evaluator</text>

  <rect class="state" x="908" y="412" width="152" height="58" rx="16" />
  <text class="label" x="932" y="444">Passed</text>
  <text class="muted" x="932" y="462">step complete</text>

  <rect class="state" x="1080" y="412" width="180" height="58" rx="16" />
  <text class="label" x="1102" y="444">Revising</text>
  <text class="muted" x="1102" y="462">fix and rerun</text>

  <rect class="chip" x="908" y="486" width="352" height="28" rx="999" />
  <text class="text" x="924" y="505">State file keeps the task ordered until every step reaches PASS.</text>

  <path class="arrowBlue" d="M 576 390 C 616 390 630 390 670 390" />
  <path class="arrowRed" d="M 748 390 C 748 420 648 430 652 439" />
  <path class="arrow" d="M 1060 171 C 1060 220 1030 250 1010 332" />
  <path class="arrow" d="M 1114 390 C 1090 390 1080 390 1042 390" />
  <path class="arrow" d="M 1084 469 C 1042 469 1018 469 978 469" />

  <text class="muted" x="24" y="598">Pattern: one step at a time, one score at a time, one state file tracking the iteration until the next safe move.</text>
</svg>
